model_name: "FacebookAI/xlm-roberta-base"
run_name: "xlmr_language_bias"
train_path: "data/raw/ner_spaeng_train.csv"
validation_path: "data/raw/ner_spaeng_validation.csv"
test_path: "data/raw/ner_spaeng_test.csv"
output_dir: "outputs/real_ner"
max_length: 128
batch_size: 8
eval_batch_size: 16
learning_rate: 0.00003
weight_decay: 0.01
epochs: 5
warmup_ratio: 0.1
seed: 42
label_all_tokens: false
gradient_clip_norm: 1.0
dropout: null
num_workers: 0
save_best_metric: "f1"
use_language_bias: true
use_lid_feature: true
language_embedding_dim: 32
language_gate_hidden_dim: 128
